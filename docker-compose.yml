version: '3.8'

services:
  db:
    image: postgres:15
    container_name: todo_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=todo_db
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: todo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"